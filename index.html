<!DOCTYPE HTML>
<HTML LANG="en">
<HEAD>
    <META CHARSET="UTF-8">
    <META NAME="viewport" content="width=device-width, initial-scale=1.0">
    <TITLE>Api Engine Dashboard</TITLE>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <LINK REL="stylesheet" href="style.css">

    <!-- ApexCharts CDN -->
    <SCRIPT SRC="https://cdn.jsdelivr.net/npm/apexcharts"></SCRIPT>
</HEAD>
<BODY>

    <DIV CLASS="dashboard-wrapper">
        <!-- Dashboard Header -->
        <HEADER CLASS="dashboard-header">
            <DIV CLASS="header-left">
                <H1>
                    <img src="assets/favicon.ico" alt="API Logo" class="header-icon"> 
                    API Engine Dashboard
                    <a href="https://github.com/germanter/apiEngine" target="_blank" class="github-link" title="View on GitHub">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </a>
                </H1>
            </DIV>
            <DIV CLASS="header-right">
                <BUTTON ID="refresh-btn" CLASS="action-btn">
                    <SPAN CLASS="btn-icon">🔄</SPAN> Yenilə
                </BUTTON>
            </DIV>
        </HEADER>

        <!-- KPI Cards Block -->
        <DIV CLASS="metrics-grid">
            <DIV CLASS="metric-card">
                <DIV CLASS="metric-label">Ən çox API-li kateqoriya</DIV>
                <DIV ID="total-apis-count" CLASS="metric-value">-</DIV>
            </DIV>
            <DIV CLASS="metric-card">
                <DIV CLASS="metric-label">Ən Yaxşı Kateqoriya</DIV>
                <DIV ID="best-category-value" CLASS="metric-value">-</DIV>
            </DIV>
            <DIV CLASS="metric-card">
                <DIV CLASS="metric-label">Ən çox aktiv API-li kateqoriya</DIV>
                <DIV ID="alive-apis-count" CLASS="metric-value">-</DIV>
            </DIV>
        </DIV>

        <!-- Charts Section -->
        <DIV CLASS="charts-grid">
            <!-- Gauge Chart Card (Böyüdülmüş) -->
            <DIV CLASS="chart-card gauge-card">
                <DIV CLASS="chart-header">
                    <H3 CLASS="chart-title">API-lərin Vəziyyəti (Status)</H3>
                </DIV>
                <DIV CLASS="chart-body gauge-body">
                    <DIV ID="gauge-chart" CLASS="chart-element"></DIV>
                </DIV>
                <DIV CLASS="filter-buttons-container" ID="status-filter-buttons">
                    <!-- Dinamik doldurulur -->
                </DIV>
            </DIV>

            <!-- Cost Chart Card (Yığımcam saxlanılıb) -->
            <DIV CLASS="chart-card cost-card">
                <DIV CLASS="chart-header">
                    <H3 CLASS="chart-title">Qiymətləndirmə (Cost)</H3>
                </DIV>
                <DIV CLASS="chart-body cost-body">
                    <DIV ID="cost-chart" CLASS="chart-element"></DIV>
                </DIV>
                <DIV CLASS="filter-buttons-container" ID="cost-filter-buttons">
                    <!-- Dinamik doldurulur -->
                </DIV>
            </DIV>
        </DIV>

        <!-- Bottom Side-by-Side Section -->
        <DIV CLASS="bottom-layout-grid">
            <!-- Left Panel: Kateqoriyaya görə say -->
            <DIV CLASS="chart-card bottom-card" ID="category-panel">
                <DIV CLASS="chart-header">
                    <H3 CLASS="chart-title">Kateqoriyaya görə say</H3>
                </DIV>
                <DIV ID="category-bars-container" CLASS="category-bars-list scrollable-content">
                    <!-- Dinamik horizontal barlar -->
                </DIV>
            </DIV>

            <!-- Right Panel: API Listi (Cədvəl) -->
            <DIV CLASS="chart-card bottom-card" ID="table-panel">
                <DIV CLASS="table-card-header">
                    <H3 CLASS="chart-title">API Listi</H3>
                    <SPAN ID="filtered-count-label" CLASS="table-subtitle">Göstərilir: 0 / 0</SPAN>
                </DIV>
                <DIV CLASS="table-responsive scrollable-content">
                    <TABLE ID="api-table" CLASS="modern-table">
                        <!-- Dinamik doldurulur -->
                    </TABLE>
                </DIV>
            </DIV>
        </DIV>
    </DIV>

    <!-- SCRIPT CONN -->
    <SCRIPT src="main.js" type="module"></SCRIPT>
</BODY>
</HTML>
